[alembic]
script_location = alembic
prepend_sys_path = .

# Timezone for migration filenames/timestamps.
# Migration filename timestamps use the local naive clock (no `timezone =`
# setting here). Alembic's `timezone` option requires resolving an IANA
# timezone via Python's `zoneinfo`, which needs the separate `tzdata`
# package on Windows (unlike Linux/macOS, which ship a system tz database) -
# omitting it keeps this working out of the box on every OS with zero extra
# dependencies. Purely cosmetic either way; it only affects the timestamp
# in generated migration filenames, never the migrations themselves.

# Max length for migration slug in filenames.
truncate_slug_length = 40

# sqlalchemy.url is intentionally left empty here. env.py reads the real
# connection string from app.core.config.settings (i.e. your .env file) at
# runtime, so this file never needs editing when you switch databases or
# environments.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
